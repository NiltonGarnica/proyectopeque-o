<ng-container *ngIf="auth.isLoggedIn()">

  <!-- Hamburger (mobile) -->
  <button class="hamburger" (click)="toggle()">☰</button>

  <!-- Overlay (mobile) -->
  <div class="overlay" *ngIf="menuOpen" (click)="close()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="menuOpen">
    <div class="sidebar-logo">
      <span class="logo-icon">🎵</span>
      <span class="logo-text">Powersound</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="close()">
        <span class="nav-icon">🏠</span> Reservas
      </a>
      <a routerLink="/proyectos" routerLinkActive="active" (click)="close()">
        <span class="nav-icon">🎧</span> Proyectos
      </a>
      <a routerLink="/pagos" routerLinkActive="active" (click)="close()">
        <span class="nav-icon">💳</span> Pagos
      </a>
      <!-- Estudio expandable group -->
      <div class="nav-group">
        <a class="nav-parent" [class.active]="isOnStudio" [class.expanded]="studioExpanded"
           (click)="toggleStudio($event)" href="#">
          <span class="nav-icon">🎹</span>
          <span class="nav-parent-label">Estudio</span>
          <span class="nav-chevron">{{ studioExpanded ? '▲' : '▼' }}</span>
        </a>
        <div class="nav-submenu" [class.open]="studioExpanded">
          <button class="nav-sub-item" (click)="openStudioTool('archivos')">📁 Archivos</button>
          <button class="nav-sub-item" (click)="openStudioTool('preview')">🎧 Preview</button>
          <button class="nav-sub-item" (click)="openStudioTool('grabador')">🎤 Grabador</button>
          <button class="nav-sub-item" (click)="openStudioTool('karaoke')">🎙 Karaoke</button>
          <button class="nav-sub-item" (click)="openStudioTool('pianoAdv')">🎹 Piano Roll</button>
          <button class="nav-sub-item" (click)="openStudioTool('mixer')">🎚 Mixer</button>
          <button class="nav-sub-item" (click)="openStudioTool('mezclas')">📂 Mezclas</button>
        </div>
      </div>
      <a routerLink="/admin" routerLinkActive="active" (click)="close()" *ngIf="auth.getRol() === 'admin'">
        <span class="nav-icon">⚙️</span> Admin
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-name">{{ auth.getNombre() }}</div>
      <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>
  </aside>

</ng-container>
