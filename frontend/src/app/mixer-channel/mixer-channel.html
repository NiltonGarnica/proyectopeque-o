<div class="mc-strip"
     [class.mc-muted]="!pista.activa"
     [class.mc-solo]="isSolo"
     [class.mc-playing]="reproduciendo && pista.activa"
     [style.--tc]="pista.color">

  <!-- Color accent bar -->
  <div class="mc-color-bar"></div>

  <!-- Track name -->
  <div class="mc-name" [title]="pista.nombre">{{ pista.nombre }}</div>

  <!-- Buttons -->
  <div class="mc-btns">
    <button class="mc-btn mc-btn-m"
      [class.mc-btn-on]="!pista.activa"
      (click)="toggleMute.emit(pista)"
      [title]="pista.activa ? 'Mute' : 'Activar'">
      {{ pista.activa ? 'M' : '🔇' }}
    </button>
    <button class="mc-btn mc-btn-s"
      [class.mc-btn-on]="isSolo"
      (click)="toggleSolo.emit(index)"
      title="Solo">S</button>
    <button class="mc-btn mc-btn-del"
      (click)="eliminar.emit(index)"
      title="Eliminar">✕</button>
  </div>

  <!-- Volume fader (vertical via rotation) -->
  <div class="mc-fader-wrap">
    <input class="mc-fader"
      type="range" min="0" max="2" step="0.01"
      [(ngModel)]="pista.efectos.volumen"
      (input)="onVol()">
  </div>

  <!-- Volume value -->
  <div class="mc-vol">{{ (pista.efectos.volumen * 100).toFixed(0) }}</div>

</div>
