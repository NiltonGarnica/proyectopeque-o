<div class="tl-container">

  <div class="tl-toolbar">
    <h3>🎬 Timeline</h3>
    <div class="tl-actions">
      <button class="tl-btn" (click)="zoomOut()" title="Alejar">🔍−</button>
      <button class="tl-btn" (click)="zoomIn()" title="Acercar">🔍+</button>
      <button class="tl-btn" (click)="copySelected()" [disabled]="!selectedSeg" title="Copiar segmento seleccionado">📋 Copiar</button>
      <button class="tl-btn tl-btn-cut" (click)="splitAtPlayhead()" title="Cortar en posición actual">✂ Cortar</button>
    </div>
  </div>

  <div class="tl-scroll" (pointerdown)="clearSelection()">

    <!-- Regla de tiempo -->
    <div class="tl-row tl-ruler-row">
      <div class="tl-label-col tl-label-ruler"></div>
      <div class="tl-content" [style.width.px]="timelineWidth"
           (click)="onRulerClick($event)" (pointerdown)="$event.stopPropagation()">
        <div *ngFor="let t of rulerTicks" class="tl-tick" [style.left.px]="t * pxPerSecond">
          <span>{{ t }}s</span>
        </div>
      </div>
    </div>

    <!-- Filas de pistas -->
    <div class="tl-row tl-track-row"
         *ngFor="let p of pistas; let pi = index"
         [class.tl-drop-target]="isDraggingOver(pi)">
      <div class="tl-label-col" [title]="p.nombre">
        <span class="tl-label-name">{{ p.nombre }}</span>
        <button class="tl-del-btn" (click)="deletePista.emit(pi)" title="Eliminar pista">✕</button>
      </div>
      <div class="tl-content" [style.width.px]="timelineWidth">

        <div *ngFor="let s of p.segmentos; let si = index"
             class="tl-block"
             [class.tl-muted]="!p.activa"
             [class.tl-selected]="selectedSeg?.pi === pi && selectedSeg?.si === si"
             [style.left.px]="s.startTime * pxPerSecond"
             [style.width.px]="segWidth(s)"
             [style.background]="p.color"
             (contextmenu)="onContextMenu($event, pi, si)">
          <!-- Handle izquierdo (trim) -->
          <div class="tl-handle" (pointerdown)="startTrim($event, pi, si, 'left')">
            <span>◀</span>
          </div>
          <!-- Cuerpo (mover + seleccionar con tap) -->
          <div class="tl-block-body" (pointerdown)="startMove($event, pi, si)"
               [class.tl-selected-body]="selectedSeg?.pi === pi && selectedSeg?.si === si">
            <!-- Waveform -->
            <svg *ngIf="getWaveformPath(s.url)" class="tl-waveform"
                 viewBox="0 0 100 28" preserveAspectRatio="none">
              <path [attr.d]="getWaveformPath(s.url)" fill="rgba(255,255,255,0.28)" />
            </svg>
            <span class="tl-block-label">{{ s.nombre }}</span>
          </div>
          <!-- Handle derecho (trim) -->
          <div class="tl-handle" (pointerdown)="startTrim($event, pi, si, 'right')">
            <span>▶</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Filas vacías (placeholder hasta 10 pistas) -->
    <div class="tl-row tl-track-row tl-empty-row" *ngFor="let e of emptyRows">
      <div class="tl-label-col tl-label-empty">
        <span class="tl-label-name tl-label-ghost">Pista {{ pistas.length + e + 1 }}</span>
      </div>
      <div class="tl-content tl-content-empty" [style.width.px]="timelineWidth"></div>
    </div>

    <!-- Indicador de nueva pista -->
    <div class="tl-row tl-new-row" *ngIf="isNewRowTarget()">
      <div class="tl-label-col tl-label-new">+ nueva pista</div>
      <div class="tl-content" [style.width.px]="timelineWidth"></div>
    </div>

    <!-- Playhead -->
    <div class="tl-playhead" [style.left.px]="LABEL_W + playheadTime * pxPerSecond">
      <div class="tl-playhead-head"></div>
    </div>

  </div>

  <p class="tl-hint">
    Tap para seleccionar · Arrastra para mover · Arrastra verticalmente para cambiar de pista · Clic derecho para más opciones · ✂ para cortar · 📋 para copiar
  </p>

</div>

<!-- Menú contextual (fuera del scroll para no ser recortado) -->
<div class="tl-ctx-menu" *ngIf="contextMenu"
     [style.left.px]="contextMenu.x"
     [style.top.px]="contextMenu.y"
     (click)="$event.stopPropagation()">
  <button class="tl-ctx-btn" (click)="ctxCopy()">📋 Copiar al lado</button>
  <button class="tl-ctx-btn" (click)="ctxDuplicate()">🔁 Duplicar en nueva pista</button>
  <div class="tl-ctx-sep"></div>
  <button class="tl-ctx-btn tl-ctx-danger" (click)="ctxDelete()">🗑 Eliminar segmento</button>
</div>
